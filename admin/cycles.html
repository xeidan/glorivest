<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Cycles</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">

<div class="flex min-h-screen">
  <aside class="w-72 bg-slate-900 border-r border-slate-800 p-6">
    <div class="mb-10">
      <p class="text-blue-400 text-xs tracking-[0.3em] uppercase">Glorivest</p>
      <h1 class="text-2xl font-semibold mt-2">Admin</h1>
    </div>

    <nav class="space-y-2 text-sm">
      <a href="./dashboard.html" class="block px-4 py-3 rounded-2xl hover:bg-slate-800">Dashboard</a>
      <a href="./deposits.html" class="block px-4 py-3 rounded-2xl hover:bg-slate-800">Deposits</a>
      <a href="./withdrawals.html" class="block px-4 py-3 rounded-2xl hover:bg-slate-800">Withdrawals</a>
      <a href="./cycles.html" class="block px-4 py-3 rounded-2xl bg-blue-600">Cycles</a>
      <a href="./audit.html" class="block px-4 py-3 rounded-2xl hover:bg-slate-800">Audit Logs</a>
      <button id="logoutBtn" class="w-full text-left px-4 py-3 rounded-2xl text-rose-400 hover:bg-slate-800">Logout</button>
    </nav>
  </aside>

  <main class="flex-1 p-8 space-y-6 overflow-auto">
    <section>
      <h2 class="text-3xl font-semibold">Cycles Monitor</h2>
      <p class="text-slate-400 mt-2">Track all active user investment cycles.</p>
    </section>

    <section class="grid md:grid-cols-2 gap-4">
      <input id="searchInput" placeholder="Search email / user id" class="rounded-2xl bg-slate-900 border border-slate-700 px-4 py-3 outline-none">
      <select id="statusFilter" class="rounded-2xl bg-slate-900 border border-slate-700 px-4 py-3">
        <option value="RUNNING">Running</option>
        <option value="">All</option>
        <option value="COMPLETED">Completed</option>
        <option value="CANCELLED">Cancelled</option>
      </select>
    </section>

    <section class="rounded-3xl border border-white/10 bg-white/5 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-slate-900 text-slate-300">
            <tr>
              <th class="text-left px-4 py-4">Cycle ID</th>
              <th class="text-left px-4 py-4">User ID</th>
              <th class="text-left px-4 py-4">Email</th>
              <th class="text-left px-4 py-4">Capital</th>
              <th class="text-left px-4 py-4">Expected Profit</th>
              <th class="text-left px-4 py-4">Started</th>
              <th class="text-left px-4 py-4">Ends</th>
              <th class="text-left px-4 py-4">Days Left</th>
              <th class="text-left px-4 py-4">Status</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>
  </main>
</div>

<script>
const BASE_URL = 'https://glorivest-api-a16f75b6b330.herokuapp.com/api';
let rows = [];

function guardAdmin() {
  const token = localStorage.getItem('token');
  const user = JSON.parse(localStorage.getItem('user') || '{}');
  if (!token || (user.role || '').toLowerCase() !== 'admin') {
    location.href = './login.html';
  }
}

async function api(path) {
  const token = localStorage.getItem('token');
  const res = await fetch(BASE_URL + path, {
    headers: {
      Authorization: `Bearer ${token}`
    }
  });

  if (res.status === 401) {
    localStorage.clear();
    location.href = './login.html';
    return;
  }

  return await res.json();
}

async function loadRows() {
  const data = await api('/admin/cycles');
  rows = data || [];
  renderTable();
}

function daysLeft(endsAt) {
  const diff = new Date(endsAt) - new Date();
  return Math.max(0, Math.ceil(diff / 86400000));
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  const search = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;

  const filtered = rows.filter(item => {
    const blob = JSON.stringify(item).toLowerCase();
    const matchSearch = !search || blob.includes(search);
    const matchStatus = !status || item.status === status;
    return matchSearch && matchStatus;
  });

  tbody.innerHTML = filtered.map(item => `
    <tr class="border-t border-white/5">
      <td class="px-4 py-4">${item.id}</td>
      <td class="px-4 py-4">${item.user_id}</td>
      <td class="px-4 py-4">${item.email || '-'}</td>
      <td class="px-4 py-4">$${(Number(item.capital_cents || 0) / 100).toFixed(2)}</td>
      <td class="px-4 py-4">$${(Number(item.expected_profit_cents || 0) / 100).toFixed(2)}</td>
      <td class="px-4 py-4">${new Date(item.started_at).toLocaleString()}</td>
      <td class="px-4 py-4">${new Date(item.ends_at).toLocaleString()}</td>
      <td class="px-4 py-4">${daysLeft(item.ends_at)}</td>
      <td class="px-4 py-4">${item.status}</td>
    </tr>
  `).join('');
}

document.getElementById('searchInput').addEventListener('input', renderTable);
document.getElementById('statusFilter').addEventListener('change', renderTable);

document.getElementById('logoutBtn').addEventListener('click', () => {
  localStorage.clear();
  location.href = './login.html';
});

guardAdmin();
loadRows();
</script>

</body>
</html>
