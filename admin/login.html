<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glorivest Admin Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-white flex items-center justify-center relative overflow-hidden">
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(59,130,246,.18),transparent_30%),radial-gradient(circle_at_bottom_left,rgba(16,185,129,.14),transparent_25%)]"></div>
  <div class="relative z-10 w-full max-w-md px-6">
    <div class="rounded-3xl border border-white/10 bg-white/5 backdrop-blur-xl shadow-2xl p-8">
      <div class="mb-8">
        <p class="text-blue-400 text-sm tracking-[0.3em] uppercase">Glorivest</p>
        <h1 class="text-3xl font-semibold mt-2">Admin Portal</h1>
        <p class="text-slate-400 mt-2 text-sm">Secure access for authorized operators only.</p>
      </div>
      <form id="loginForm" class="space-y-5">
        <div>
          <label class="block text-sm text-slate-300 mb-2">Email</label>
          <input id="email" type="email" required class="w-full rounded-2xl bg-slate-900/80 border border-slate-700 px-4 py-3 outline-none focus:border-blue-500" placeholder="admin@glorivest.com" />
        </div>
        <div>
          <label class="block text-sm text-slate-300 mb-2">Password</label>
          <input id="password" type="password" required class="w-full rounded-2xl bg-slate-900/80 border border-slate-700 px-4 py-3 outline-none focus:border-blue-500" placeholder="••••••••" />
        </div>
        <button class="w-full rounded-2xl bg-blue-600 hover:bg-blue-500 transition py-3 font-medium">Sign In</button>
      </form>
      <p id="msg" class="text-sm mt-4 text-rose-400 hidden"></p>
    </div>
  </div>
<script>
const BASE_URL='https://glorivest-api-a16f75b6b330.herokuapp.com/api';
document.getElementById('loginForm').addEventListener('submit', async (e)=>{
 e.preventDefault();
 const msg=document.getElementById('msg'); msg.classList.add('hidden');
 const email=document.getElementById('email').value.trim();
 const password=document.getElementById('password').value;
 try {
   const res=await fetch(BASE_URL+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
   const data=await res.json();
   if(!res.ok) throw new Error(data.message||'Login failed');
   if((data.user?.role||'').toLowerCase()!=='admin') throw new Error('Admin access required');
   localStorage.setItem('token',data.token);
   localStorage.setItem('user',JSON.stringify(data.user));
   location.href='./dashboard.html';
 } catch(err){ msg.textContent=err.message; msg.classList.remove('hidden'); }
});
</script>
</body>
</html>
