<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>Forgot Password | Glorivest</title>
  <meta
    name="description"
    content="Reset your Glorivest account password securely. Request a verification code and regain access to your account."
  />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#0B0B0B" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" href="/favicon.png" />
  <link href="output.css" rel="stylesheet" />
</head>

<body class="min-h-screen bg-black text-white font-[Inter] overflow-hidden">

  <!-- Ambient Background -->
  <div class="fixed inset-0 pointer-events-none">
    <div class="absolute top-20 left-10 w-56 h-56 rounded-full bg-[#00D2B1]/10 blur-3xl"></div>
    <div class="absolute bottom-10 right-10 w-72 h-72 rounded-full bg-[#00D2B1]/10 blur-3xl"></div>
  </div>

  <!-- Wrapper -->
  <main class="relative min-h-screen flex items-center justify-center px-4 py-10">

    <section class="w-full max-w-md rounded-[2rem] border border-white/10 bg-white/[0.04] backdrop-blur-2xl p-6 sm:p-8 shadow-[0_20px_80px_rgba(0,0,0,0.45)]">

      <!-- Logo -->
      <div class="text-center mb-8">
        <img
          src="glorivest-logo.png"
          alt="Glorivest"
          width="180"
          height="44"
          class="mx-auto mb-6"
        />

        <p class="text-sm text-white/45">Account recovery</p>

        <h1 class="text-3xl sm:text-4xl font-semibold tracking-tight mt-2">
          Forgot password?
        </h1>

        <p class="mt-3 text-sm sm:text-base text-white/55 leading-relaxed">
          Enter your email address and we’ll send you a verification code.
        </p>
      </div>

      <!-- Form -->
      <div class="space-y-4">

        <input
          id="email"
          type="email"
          inputmode="email"
          autocomplete="email"
          placeholder="Email address"
          class="w-full h-12 px-4 rounded-2xl bg-white/[0.04] border border-white/10 text-sm placeholder-white/35 focus:outline-none focus:border-[#00D2B1] transition"
        />

        <button
          onclick="requestReset()"
          class="w-full h-12 rounded-2xl bg-[#00D2B1] text-black font-semibold hover:brightness-110 transition"
        >
          Send Verification Code
        </button>

        <p
          id="status"
          class="min-h-[20px] text-center text-sm text-white/45"
        ></p>

      </div>

      <!-- Footer -->
      <div class="mt-6 text-center">
        <a
          href="index.html"
          class="text-sm text-white/45 hover:text-white transition"
        >
          Back to home
        </a>
      </div>

    </section>
  </main>

  <script src="forgot-password.js"></script>
</body>
</html>
