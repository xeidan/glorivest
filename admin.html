<!DOCTYPE html>
<html>
<head>
  <title>Glorivest Admin</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="admin.css">
  <script src="admin.js" defer></script>
</head>

<body class="bg-slate-950 text-slate-200">

<div class="flex h-screen">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-slate-900 border-r border-slate-800 p-4">
    <h2 class="text-lg font-semibold text-blue-400 mb-6">Glorivest</h2>

    <nav class="space-y-2">
      <button onclick="showPage('dashboard')" class="nav-btn">Dashboard</button>
      <button onclick="showPage('deposits')" class="nav-btn">Deposits</button>
      <button onclick="showPage('withdrawals')" class="nav-btn">Withdrawals</button>
      <button onclick="logout()" class="nav-btn text-red-400">Logout</button>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="flex-1 p-6 overflow-y-auto space-y-6">

    <!-- DASHBOARD -->
    <section id="page-dashboard" class="page space-y-6">
      <h1 class="text-xl font-semibold">Dashboard</h1>

      <div class="grid grid-cols-4 gap-4">
        <div class="card"><p>Total Deposits</p><h2 id="statDeposits">-</h2></div>
        <div class="card"><p>Withdrawals</p><h2 id="statWithdrawals">-</h2></div>
        <div class="card"><p>Users</p><h2>-</h2></div>
        <div class="card"><p>Balance</p><h2>-</h2></div>
      </div>

      <div class="card">
        <canvas id="chart"></canvas>
      </div>
    </section>

    <!-- DEPOSITS -->
    <section id="page-deposits" class="page hidden space-y-4">

      <h1 class="text-xl font-semibold">Deposits</h1>

      <div class="flex gap-3">
        <input id="search" placeholder="Search user..." class="input">
        <select id="statusFilter" class="input">
          <option value="">All</option>
          <option value="SUCCESS">Success</option>
          <option value="USER_MARKED_PAID">Pending</option>
        </select>
      </div>

      <div class="table">
        <table class="w-full">
          <thead>
            <tr>
              <th>User</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="depositsTable"></tbody>
        </table>
      </div>

      <div class="flex justify-between">
        <button onclick="prevPage()">Prev</button>
        <button onclick="nextPage()">Next</button>
      </div>

    </section>

  </main>

</div>

</body>
</html>
