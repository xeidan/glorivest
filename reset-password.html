<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>Create New Password | Glorivest</title>
  <meta
    name="description"
    content="Create a new password and securely regain access to your Glorivest account."
  />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#0B0B0B" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" href="/favicon.png" />
  <link href="./output.css" rel="stylesheet" />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
</head>

<body class="min-h-screen bg-black text-white font-[Inter] overflow-hidden">

  <!-- Ambient Glow -->
  <div class="fixed inset-0 pointer-events-none">
    <div class="absolute top-16 left-8 w-56 h-56 rounded-full bg-[#00D2B1]/10 blur-3xl"></div>
    <div class="absolute bottom-10 right-8 w-72 h-72 rounded-full bg-[#00D2B1]/10 blur-3xl"></div>
  </div>

  <main class="relative min-h-screen flex items-center justify-center px-4 py-10">

    <section class="w-full max-w-md rounded-[2rem] border border-white/10 bg-white/[0.04] backdrop-blur-2xl p-6 sm:p-8 shadow-[0_20px_80px_rgba(0,0,0,0.45)]">

      <!-- Header -->
      <div class="text-center mb-8">
        <img
          src="glorivest-logo.png"
          alt="Glorivest"
          width="180"
          height="44"
          class="mx-auto mb-6"
        />

        <p class="text-sm text-white/45">Account recovery</p>

        <h1 class="text-3xl sm:text-4xl font-semibold tracking-tight mt-2">
          Create new password
        </h1>

        <p class="mt-3 text-sm sm:text-base text-white/55 leading-relaxed">
          Choose a strong password with letters, numbers, and symbols.
        </p>
      </div>

      <!-- Form -->
      <div class="space-y-4">

        <div class="relative">
          <input
            id="password"
            type="password"
            autocomplete="new-password"
            placeholder="New password"
            class="w-full h-12 px-4 pr-12 rounded-2xl bg-white/[0.04] border border-white/10 text-sm placeholder-white/35 focus:outline-none focus:border-[#00D2B1] transition"
          />

          <button
            id="toggle-password"
            type="button"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-white/45 hover:text-white transition"
            aria-label="Toggle password"
          >
            <i id="eye-icon" class="fa-solid fa-eye-slash"></i>
          </button>
        </div>

        <button
          id="reset-btn"
          onclick="resetPassword()"
          class="w-full h-12 rounded-2xl bg-[#00D2B1] text-black font-semibold hover:brightness-110 transition"
        >
          Update Password
        </button>

        <p
          id="status"
          class="min-h-[20px] text-center text-sm text-white/45"
        ></p>

        <a
          href="index.html"
          id="login-link"
          class="hidden block text-center text-sm text-[#00D2B1] hover:brightness-110 transition"
        >
          Go back to login
        </a>

      </div>

    </section>
  </main>

  <script src="./reset-password.js"></script>
</body>
</html>
