<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Reset Password</title>

  <!-- Tailwind -->
  <link href="./output.css" rel="stylesheet" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-gradient-to-br from-[#00D2B1] to-[#008080] min-h-screen flex items-center justify-center px-4">

  <div class="bg-white shadow-xl rounded-2xl w-full max-w-md p-8 animate-fade-in">

    <!-- HEADER -->
    <h2 class="text-3xl font-bold text-gray-800 text-center mb-2">
      Reset Password
    </h2>

    <p class="text-sm text-gray-500 text-center mb-6">
      Enter your new password
    </p>

    <!-- PASSWORD INPUT -->
    <div class="relative mb-5">
      <input
        id="password"
        type="password"
        placeholder="New Password"
        class="w-full border rounded-xl px-4 py-3 pr-14 focus:outline-none focus:ring-2 focus:ring-[#00D2B1]"
      />

      <button
        id="toggle-password"
        type="button"
        class="absolute top-0 bottom-0 right-4 flex items-center text-gray-500"
      >
        <i id="eye-icon" class="fa-solid fa-eye text-lg"></i>
      </button>
    </div>

    <!-- SUBMIT -->
    <button
      id="reset-btn"
      onclick="resetPassword()"
      class="w-full bg-[#00D2B1] hover:bg-[#00b8a1] transition text-white font-bold py-3 rounded-xl mb-4 active:scale-[0.98]"
    >
      Update Password
    </button>

    <!-- STATUS -->
    <p id="status" class="text-center text-sm mt-4"></p>

    <!-- BACK TO LOGIN -->
    <a
      href="index.html"
      id="login-link"
      class="hidden block text-center mt-4 text-[#00D2B1] font-semibold hover:underline"
    >
      Go back to login
    </a>

  </div>


  <!-- FALLBACK + ANIMATION -->
  <style>
    .animate-fade-in {
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>


  <!-- SCRIPT -->
  <script src="./reset-password.js"></script>

</body>
</html>
